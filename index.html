<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Jobs - Find Your Dream Remote Job</title>
<meta name="description" content="Browse thousands of remote job opportunities at top companies worldwide. Find your perfect remote career today.">
<meta name="robots" content="index, follow">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap');
:root {
  --primary: #1a1a2e;
  --accent: #e94560;
  --bg: #f0f0f8;
  --card: #ffffff;
  --border: #d0d0e8;
  --text: #1a1a2e;
  --muted: #6b6b8a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

/* Nav */
nav { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
.logo { font-family: 'Manrope', sans-serif; font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; }
.nav-badge { background: var(--accent); color: #fff; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.78rem; font-weight: 700; }

/* Hero */
.hero { background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460); padding: 5rem 2rem 4rem; text-align: center; border-radius: 0 0 40px 40px; }
.hero h1 { font-family: 'Manrope', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: #fff; margin-bottom: 1rem; line-height: 1.2; }
.hero h1 span { color: #e94560; }
.hero p { color: rgba(255,255,255,0.75); font-size: 1.1rem; margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; }
.search-wrap { max-width: 620px; margin: 0 auto 2rem; display: flex; gap: 0.5rem; background: #fff; border-radius: 14px; padding: 0.4rem; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
.search-wrap input { flex: 1; border: none; padding: 0.75rem 1rem; font-size: 1rem; outline: none; font-family: 'Inter', sans-serif; background: transparent; }
.search-wrap button { background: linear-gradient(135deg, #e94560, #c73652); color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.95rem; white-space: nowrap; }
.search-wrap button:hover { opacity: 0.9; }

/* Stats */
.stats { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
.stat { text-align: center; }
.stat-number { font-family: 'Manrope', sans-serif; font-size: 2rem; font-weight: 800; color: #e94560; }
.stat-label { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-top: 0.2rem; }

/* Filters */
.filters { max-width: 1200px; margin: 2rem auto 0; padding: 0 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-right: 0.25rem; }
.filter-btn { padding: 0.5rem 1.2rem; border: 2px solid var(--border); border-radius: 50px; background: var(--card); color: var(--muted); font-weight: 600; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.filter-btn:hover, .filter-btn.active { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.08); }

/* Container */
.container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.section-title { font-family: 'Manrope', sans-serif; font-size: 1.5rem; font-weight: 800; }
.results-count { font-size: 0.85rem; color: var(--muted); font-weight: 500; }

/* Grid */
.jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.1rem; }
.job-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 1.4rem; transition: all 0.2s; text-decoration: none; color: inherit; display: block; }
.job-card:hover { border-color: #e94560; transform: translateY(-3px); box-shadow: 0 8px 24px rgba(233,69,96,0.12); }
.job-company { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
.job-title { font-family: 'Manrope', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; line-height: 1.3; color: var(--primary); }
.job-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.tag { padding: 0.22rem 0.65rem; border-radius: 6px; font-size: 0.72rem; font-weight: 600; }
.tag-remote { background: rgba(233,69,96,0.1); color: #e94560; }
.tag-type { background: #eaeaf8; color: var(--muted); }
.tag-location { background: #e8f5e9; color: #2e7d32; }

/* Pagination */
.pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 2.5rem; flex-wrap: wrap; }
.page-btn { padding: 0.55rem 1rem; border: 2px solid var(--border); border-radius: 8px; background: var(--card); color: var(--muted); font-weight: 600; font-size: 0.85rem; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
.page-btn:hover, .page-btn.active { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.08); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Empty */
.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty-icon { font-size: 3rem; margin-bottom: 1rem; }

/* Footer */
footer { background: linear-gradient(135deg, #1a1a2e, #16213e); color: rgba(255,255,255,0.7); text-align: center; padding: 2rem; font-size: 0.85rem; margin-top: 2rem; }
footer a { color: rgba(255,255,255,0.5); text-decoration: none; margin: 0 0.75rem; }
footer a:hover { color: #e94560; }

@media(max-width: 600px) {
  .jobs-grid { grid-template-columns: 1fr; }
  .hero { padding: 3rem 1.5rem; }
  .stats { gap: 1.25rem; }
  .container { padding: 1rem 1rem 3rem; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">⚡ Remote Jobs</a>
  <span class="nav-badge" id="navCount">Loading...</span>
</nav>

<div class="hero">
  <h1>Find Your <span>Remote Job</span> Today</h1>
  <p>Browse thousands of remote job opportunities at top companies worldwide. Your next career move starts here.</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search by job title, company, or keyword..." />
    <button onclick="doSearch()">🔍 Search</button>
  </div>
  <div class="stats" id="statsBar"></div>
</div>

<div class="filters">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">All Jobs</button>
  <button class="filter-btn" onclick="setFilter('remote', this)">🌐 Remote</button>
  <button class="filter-btn" onclick="setFilter('engineer', this)">💻 Engineering</button>
  <button class="filter-btn" onclick="setFilter('manager', this)">📋 Management</button>
  <button class="filter-btn" onclick="setFilter('analyst', this)">📊 Analytics</button>
  <button class="filter-btn" onclick="setFilter('designer', this)">🎨 Design</button>
  <button class="filter-btn" onclick="setFilter('sales', this)">💼 Sales</button>
  <button class="filter-btn" onclick="setFilter('customer', this)">🎧 Support</button>
  <button class="filter-btn" onclick="setFilter('assistant', this)">🗂 Admin</button>
</div>

<div class="container">
  <div class="section-header">
    <div class="section-title" id="sectionTitle">All Jobs</div>
    <div class="results-count" id="resultsCount"></div>
  </div>
  <div class="jobs-grid" id="jobsGrid">
    <div class="empty"><div class="empty-icon">⏳</div><p>Loading jobs...</p></div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>
  <p style="margin-bottom:0.75rem">© 2026 Remote Jobs. All rights reserved.</p>
  <div>
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Service</a>
    <a href="#">Contact</a>
  </div>
</footer>

<script>
// ── Parse jobs from the jobs/ folder links ──
// This reads all <a> tags that were generated and builds a job list
var ALL_JOBS = [];
var JOBS_PER_PAGE = 60;
var currentPage = 1;
var currentFilter = 'all';
var currentSearch = '';

// ── Build job list from generated HTML files ──
// These are the filenames generated by the generator tool
// Format: jobs/{company}-{jobtype}-{country}.html
var JOB_FILES = [
"jobs/amazon-remote-customer-service-united-states.html","jobs/amazon-financial-analyst-united-states.html","jobs/amazon-remote-software-engineer-united-states.html","jobs/amazon-business-development-manager-united-states.html","jobs/amazon-remote-sales-representative-united-states.html","jobs/amazon-supply-chain-analyst-united-states.html","jobs/amazon-remote-project-manager-united-states.html","jobs/amazon-administrative-assistant-united-states.html","jobs/amazon-remote-ux-designer-united-states.html","jobs/amazon-social-media-manager-united-states.html","jobs/usps-remote-customer-service-united-states.html","jobs/usps-financial-analyst-united-states.html","jobs/usps-remote-software-engineer-united-states.html","jobs/usps-business-development-manager-united-states.html","jobs/usps-remote-sales-representative-united-states.html","jobs/usps-supply-chain-analyst-united-states.html","jobs/usps-remote-project-manager-united-states.html","jobs/usps-administrative-assistant-united-states.html","jobs/usps-remote-ux-designer-united-states.html","jobs/usps-social-media-manager-united-states.html","jobs/google-remote-customer-service-united-states.html","jobs/google-financial-analyst-united-states.html","jobs/google-remote-software-engineer-united-states.html","jobs/google-business-development-manager-united-states.html","jobs/google-remote-sales-representative-united-states.html","jobs/google-supply-chain-analyst-united-states.html","jobs/google-remote-project-manager-united-states.html","jobs/google-administrative-assistant-united-states.html","jobs/google-remote-ux-designer-united-states.html","jobs/google-social-media-manager-united-states.html","jobs/apple-remote-customer-service-united-states.html","jobs/apple-financial-analyst-united-states.html","jobs/apple-remote-software-engineer-united-states.html","jobs/apple-business-development-manager-united-states.html","jobs/apple-remote-sales-representative-united-states.html","jobs/apple-supply-chain-analyst-united-states.html","jobs/apple-remote-project-manager-united-states.html","jobs/apple-administrative-assistant-united-states.html","jobs/apple-remote-ux-designer-united-states.html","jobs/apple-social-media-manager-united-states.html","jobs/microsoft-remote-customer-service-united-states.html","jobs/microsoft-financial-analyst-united-states.html","jobs/microsoft-remote-software-engineer-united-states.html","jobs/microsoft-business-development-manager-united-states.html","jobs/microsoft-remote-sales-representative-united-states.html","jobs/microsoft-supply-chain-analyst-united-states.html","jobs/microsoft-remote-project-manager-united-states.html","jobs/microsoft-administrative-assistant-united-states.html","jobs/microsoft-remote-ux-designer-united-states.html","jobs/microsoft-social-media-manager-united-states.html","jobs/netflix-remote-customer-service-united-states.html","jobs/netflix-financial-analyst-united-states.html","jobs/netflix-remote-software-engineer-united-states.html","jobs/netflix-business-development-manager-united-states.html","jobs/netflix-remote-sales-representative-united-states.html","jobs/netflix-supply-chain-analyst-united-states.html","jobs/netflix-remote-project-manager-united-states.html","jobs/netflix-administrative-assistant-united-states.html","jobs/netflix-remote-ux-designer-united-states.html","jobs/netflix-social-media-manager-united-states.html","jobs/tesla-remote-customer-service-united-states.html","jobs/tesla-financial-analyst-united-states.html","jobs/tesla-remote-software-engineer-united-states.html","jobs/tesla-business-development-manager-united-states.html","jobs/tesla-remote-sales-representative-united-states.html","jobs/tesla-supply-chain-analyst-united-states.html","jobs/tesla-remote-project-manager-united-states.html","jobs/tesla-administrative-assistant-united-states.html","jobs/tesla-remote-ux-designer-united-states.html","jobs/tesla-social-media-manager-united-states.html","jobs/walmart-remote-customer-service-united-states.html","jobs/walmart-financial-analyst-united-states.html","jobs/walmart-remote-software-engineer-united-states.html","jobs/walmart-business-development-manager-united-states.html","jobs/walmart-remote-sales-representative-united-states.html","jobs/walmart-supply-chain-analyst-united-states.html","jobs/walmart-remote-project-manager-united-states.html","jobs/walmart-administrative-assistant-united-states.html","jobs/walmart-remote-ux-designer-united-states.html","jobs/walmart-social-media-manager-united-states.html","jobs/meta-remote-customer-service-united-states.html","jobs/meta-financial-analyst-united-states.html","jobs/meta-remote-software-engineer-united-states.html","jobs/meta-business-development-manager-united-states.html","jobs/meta-remote-sales-representative-united-states.html","jobs/meta-supply-chain-analyst-united-states.html","jobs/meta-remote-project-manager-united-states.html","jobs/meta-administrative-assistant-united-states.html","jobs/meta-remote-ux-designer-united-states.html","jobs/meta-social-media-manager-united-states.html","jobs/uber-remote-customer-service-united-states.html","jobs/uber-financial-analyst-united-states.html","jobs/uber-remote-software-engineer-united-states.html","jobs/uber-business-development-manager-united-states.html","jobs/uber-remote-sales-representative-united-states.html","jobs/uber-supply-chain-analyst-united-states.html","jobs/uber-remote-project-manager-united-states.html","jobs/uber-administrative-assistant-united-states.html","jobs/uber-remote-ux-designer-united-states.html","jobs/uber-social-media-manager-united-states.html"
];

function parseJob(filepath) {
  // jobs/amazon-remote-software-engineer-united-states.html
  var parts = filepath.replace('jobs/', '').replace('.html', '').split('-');
  
  // Find country by looking for known country slugs at the end
  var countries = ['united-states','united-kingdom','canada','australia','india','germany','france','netherlands','sweden','norway','denmark','spain','italy','portugal','poland','brazil','mexico','argentina','japan','south-korea','singapore','philippines','indonesia','malaysia','south-africa','nigeria','kenya','uae','saudi-arabia','israel','new-zealand','ireland','switzerland','belgium','austria','finland'];
  var slug = filepath.replace('jobs/','').replace('.html','');
  var country = 'United States';
  var countrySlug = '';
  for (var i = 0; i < countries.length; i++) {
    if (slug.endsWith('-' + countries[i])) {
      countrySlug = countries[i];
      country = countries[i].replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
      break;
    }
  }

  var withoutCountry = countrySlug ? slug.slice(0, slug.length - countrySlug.length - 1) : slug;

  // Job types to detect
  var jobTypes = ['remote-customer-service','remote-data-entry','remote-software-engineer','remote-marketing-manager','remote-sales-representative','remote-content-writer','remote-project-manager','remote-virtual-assistant','remote-ux-designer','remote-devops-engineer','operations-manager','financial-analyst','hr-manager','business-development-manager','product-manager','supply-chain-analyst','quality-assurance-engineer','administrative-assistant','graphic-designer','social-media-manager'];
  
  var jobTypeSlug = '';
  var jobTitle = '';
  for (var j = 0; j < jobTypes.length; j++) {
    if (withoutCountry.endsWith('-' + jobTypes[j])) {
      jobTypeSlug = jobTypes[j];
      jobTitle = jobTypes[j].replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
      break;
    }
  }

  var companySlug = jobTypeSlug ? withoutCountry.slice(0, withoutCountry.length - jobTypeSlug.length - 1) : withoutCountry;
  var company = companySlug.replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
  var isRemote = jobTypeSlug.startsWith('remote-');

  return {
    company: company,
    title: jobTitle,
    country: country,
    isRemote: isRemote,
    url: filepath,
    slug: slug
  };
}

function initJobs() {
  ALL_JOBS = JOB_FILES.map(parseJob);
  updateStats();
  render();
}

function updateStats() {
  var remote = ALL_JOBS.filter(function(j){ return j.isRemote; }).length;
  var companies = {};
  ALL_JOBS.forEach(function(j){ companies[j.company] = 1; });
  var companyCount = Object.keys(companies).length;

  document.getElementById('navCount').textContent = ALL_JOBS.length + ' Jobs';
  document.getElementById('statsBar').innerHTML =
    '<div class="stat"><div class="stat-number">' + ALL_JOBS.length + '+</div><div class="stat-label">Live Jobs</div></div>' +
    '<div class="stat"><div class="stat-number">' + companyCount + '+</div><div class="stat-label">Companies</div></div>' +
    '<div class="stat"><div class="stat-number">' + remote + '+</div><div class="stat-label">Remote Roles</div></div>';
}

function getFiltered() {
  var jobs = ALL_JOBS;
  if (currentSearch) {
    var q = currentSearch.toLowerCase();
    jobs = jobs.filter(function(j){
      return j.company.toLowerCase().includes(q) || j.title.toLowerCase().includes(q) || j.country.toLowerCase().includes(q);
    });
  }
  if (currentFilter !== 'all') {
    jobs = jobs.filter(function(j){
      return j.title.toLowerCase().includes(currentFilter) || j.slug.includes(currentFilter);
    });
  }
  return jobs;
}

function render() {
  var filtered = getFiltered();
  var total = filtered.length;
  var totalPages = Math.ceil(total / JOBS_PER_PAGE);
  if (currentPage > totalPages) currentPage = 1;

  var start = (currentPage - 1) * JOBS_PER_PAGE;
  var pageJobs = filtered.slice(start, start + JOBS_PER_PAGE);

  document.getElementById('resultsCount').textContent = total.toLocaleString() + ' jobs found';

  if (pageJobs.length === 0) {
    document.getElementById('jobsGrid').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>No jobs found. Try a different search.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  document.getElementById('jobsGrid').innerHTML = pageJobs.map(function(job) {
    return '<a class="job-card" href="' + job.url + '">' +
      '<div class="job-company">' + job.company + '</div>' +
      '<div class="job-title">' + job.title + '</div>' +
      '<div class="job-tags">' +
        (job.isRemote ? '<span class="tag tag-remote">🌐 Remote</span>' : '') +
        '<span class="tag tag-location">📍 ' + job.country + '</span>' +
        '<span class="tag tag-type">Full-time</span>' +
      '</div>' +
    '</a>';
  }).join('');

  // Pagination
  var pages = '';
  var maxPages = Math.min(totalPages, 10);
  var startPage = Math.max(1, currentPage - 4);
  var endPage = Math.min(totalPages, startPage + 9);

  pages += '<button class="page-btn" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>← Prev</button>';
  for (var p = startPage; p <= endPage; p++) {
    pages += '<button class="page-btn' + (p===currentPage?' active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  }
  pages += '<button class="page-btn" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?'disabled':'') + '>Next →</button>';
  document.getElementById('pagination').innerHTML = pages;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goPage(p) {
  currentPage = p;
  render();
}

function setFilter(f, btn) {
  currentFilter = f;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var titles = {all:'All Jobs', remote:'Remote Jobs', engineer:'Engineering Jobs', manager:'Management Jobs', analyst:'Analytics Jobs', designer:'Design Jobs', sales:'Sales Jobs', customer:'Customer Support', assistant:'Admin Jobs'};
  document.getElementById('sectionTitle').textContent = titles[f] || 'Jobs';
  render();
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  currentPage = 1;
  render();
}

document.getElementById('searchInput').addEventListener('keydown', function(e){
  if (e.key === 'Enter') doSearch();
});

initJobs();
</script>
</body>
</html>
